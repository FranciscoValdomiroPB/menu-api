version: '3.8'
services:
  postgres:
    image: postgres
    environment:
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: menudb
    ports:
      - "5433:5432"
    volumes:
      - ./sql/V1__create_tables.sql:/docker-entrypoint-initdb.d/V1__create_tables.sql
      - ./sql/V2__populate.sql:/docker-entrypoint-initdb.d/V2__populate.sql

  api:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/menudb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 1234